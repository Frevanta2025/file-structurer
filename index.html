<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Structurer — Local Batch File Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>File Structurer</h1>
            <p class="subtitle">Local Batch File Organizer</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section id="upload-section" class="card">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <p>Drag & drop files here or <span class="browse-link" id="browse-btn">browse</span></p>
                        <input type="file" id="file-input" multiple hidden>
                    </div>
                </div>
                <div id="file-list-summary" class="file-summary hidden">
                    <span id="file-count">0 files selected</span>
                    <button id="clear-all-btn" class="btn btn-text btn-danger">Clear All</button>
                </div>
            </section>

            <!-- Config Section -->
            <section id="config-section" class="card">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bucket-select">Bucket <span class="required">*</span></label>
                        <select id="bucket-select" required>
                            <option value="" disabled selected>Select Bucket</option>
                            <option value="PERSONAL">PERSONAL</option>
                            <option value="WORK">WORK</option>
                            <option value="FINANCE">FINANCE</option>
                            <option value="LEGAL">LEGAL</option>
                            <option value="LEARNING">LEARNING</option>
                            <option value="PRODUCT">PRODUCT</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="group-input">Group <span class="required">*</span></label>
                        <input type="text" id="group-input" placeholder="e.g. vacation_paris" list="group-history" required>
                        <datalist id="group-history"></datalist>
                    </div>

                    <div class="form-group full-width">
                        <label for="memo-input">Memo (optional)</label>
                        <textarea id="memo-input" rows="2" placeholder="Short description of the folder content"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Hint Mode</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="hint-mode" value="auto" checked>
                                <span>Auto</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="hint-mode" value="extension">
                                <span>Extension</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="hint-mode" value="custom">
                                <span>Custom</span>
                            </label>
                        </div>
                    </div>

                    <div id="custom-hint-group" class="form-group full-width hidden">
                        <label for="custom-hint-input">Custom Hint</label>
                        <input type="text" id="custom-hint-input" placeholder="e.g. photo, invoice, notes">
                    </div>

                    <div class="form-group full-width">
                        <label>Date Mode</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="date-mode" value="today" checked>
                                <span>Today</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="date-mode" value="fileModified">
                                <span>File modified</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="date-mode" value="custom">
                                <span>Custom</span>
                            </label>
                        </div>
                    </div>

                    <div id="custom-date-group" class="form-group full-width hidden">
                        <label for="custom-date-input">Custom Date</label>
                        <input type="date" id="custom-date-input">
                    </div>
                </div>
            </section>

            <!-- Preview Section -->
            <section id="preview-section" class="card">
                <h2>Preview</h2>
                <div class="table-container">
                    <table id="preview-table">
                        <thead>
                            <tr>
                                <th>Original Filename</th>
                                <th class="arrow-col">→</th>
                                <th>New Filename</th>
                                <th class="action-col"></th>
                            </tr>
                        </thead>
                        <tbody id="preview-body">
                            <!-- Rows will be injected by JavaScript -->
                        </tbody>
                    </table>
                    <div id="empty-preview" class="empty-state">
                        No files uploaded yet.
                    </div>
                </div>
            </section>

            <!-- Actions -->
            <div class="action-bar">
                <button id="generate-btn" class="btn btn-primary btn-large" disabled>
                    Generate structured archive
                </button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 File Structurer — Fast, Local, Privacy-safe.</p>
        </footer>
    </div>

    <!-- JSZip via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
